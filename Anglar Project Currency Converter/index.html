<!DOCTYPE html>
<html ng-app="passwordApp">
<head>
    <title>Password Generator</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body ng-controller="passwordController">

<h2>Password Generator</h2>

<label>Password Length:</label>
<input type="number" ng-model="length" min="4" max="30">

<br><br>

<label><input type="checkbox" ng-model="upper"> Uppercase</label>
<label><input type="checkbox" ng-model="lower"> Lowercase</label>
<label><input type="checkbox" ng-model="numbers"> Numbers</label>
<label><input type="checkbox" ng-model="symbols"> Symbols</label>

<br><br>

<button ng-click="generatePassword()">Generate Password</button>

<h3>{{password}}</h3>

</body>
<script src="script.js"></script>
</html>
